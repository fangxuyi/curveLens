event_types:
  inventory_release:
    description: "Official inventory/stock level release (EIA, API weekly)"
    typical_lag: "same_day"
    sources: ["eia_api_v2"]

  outage:
    description: "Production outage, pipeline disruption, force majeure"
    typical_lag: "event_time"
    sources: ["news", "official_operator"]

  opec:
    description: "OPEC/OPEC+ meeting, quota decision, compliance report"
    typical_lag: "event_time"
    sources: ["opec_official", "news"]

  sanctions:
    description: "Sanctions announcement, waiver expiry, enforcement action"
    typical_lag: "event_time"
    sources: ["government_official", "news"]

  refinery:
    description: "Refinery disruption, turnaround schedule, capacity change"
    typical_lag: "event_time"
    sources: ["news", "operator"]

  weather:
    description: "Hurricane, freeze, extreme weather affecting production or demand"
    typical_lag: "event_time"
    sources: ["noaa", "news"]

  macro_demand:
    description: "GDP, PMI, industrial production, large demand revision"
    typical_lag: "release_time"
    sources: ["government_statistical", "news"]

  other:
    description: "Catch-all for catalyst types not covered above"

directions:
  bullish_supply: "Supply reduction or tighter supply outlook"
  bearish_demand: "Demand reduction or weaker demand outlook"
  two_sided: "Catalyst has both supply and demand implications"
  unclear: "Direction not yet determined"

magnitudes:
  low: "Minor price impact expected (<1%)"
  medium: "Moderate price impact expected (1-3%)"
  high: "Significant price impact expected (>3%)"
  unknown: "Magnitude not assessed"

horizons:
  prompt_1m: "Next front-month contract"
  prompt_3m: "First 3 months of the curve"
  "6m": "6-month horizon"
  "12m": "12-month horizon"
  structural: "Long-dated or permanent shift"

source_quality:
  primary: "Official government release, exchange data, operator announcement"
  high_quality_secondary: "Established financial news wire, reputable analyst"
  other: "Social media, unverified source"
